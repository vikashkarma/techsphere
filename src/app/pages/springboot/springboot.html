<section class="page">

  <div class="category-hero">
    <h1>Spring Boot Tutorials</h1>

    <p>
      Learn Spring Boot, REST APIs, JPA, Security and
      Interview Questions.
    </p>

    <span class="article-count">
      {{ springBootArticles.length }} Articles Available
    </span>
  </div>

  <div
    class="article-card"
    *ngFor="let article of springBootArticles"
    [routerLink]="['/article', article.id]">

    <h3>{{ article.title }}</h3>

    <p>{{ article.description }}</p>

    <span class="read-more">
      Read Article →
    </span>

  </div>

</section>
