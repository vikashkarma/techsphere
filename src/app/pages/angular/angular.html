<section class="page">

  <div class="category-hero">
    <h1>Angular Tutorials</h1>

    <p>
      Learn Angular, Routing, Components, Signals,
      Forms and Interview Questions.
    </p>

    <span class="article-count">
      {{ angularArticles.length }} Articles Available
    </span>
  </div>

  <div
    class="article-card"
    *ngFor="let article of angularArticles"
    [routerLink]="['/article', article.id]">

    <h3>{{ article.title }}</h3>

    <p>{{ article.description }}</p>

    <span class="read-more">
      Read Article →
    </span>

  </div>

</section>
